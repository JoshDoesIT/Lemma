# OpenSSF Scorecard — measures the project's supply-chain security
# posture (signed commits, branch protection, dependency-update tooling,
# SAST coverage, etc.) and uploads the findings to GitHub's Code Scanning
# tab. The score is also surfaced as a public badge on the README so
# downstream users can see it at a glance.
#
# Refs #47 (Continuous Scanning & Supply Chain).

name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly run keeps the score current as branch-protection rules and
    # tooling change.
    - cron: "23 6 * * 1"
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Upload SARIF results to Code Scanning.
      security-events: write
      # Read OIDC token for publishing public results to the OpenSSF API.
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish public results to the OpenSSF API so the badge resolves.
          # Set to false if running a fork that shouldn't be published.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif
