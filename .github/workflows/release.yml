name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]" build cyclonedx-bom

      - name: Run tests
        run: uv run pytest --cov=lemma -v

      - name: Build package
        run: uv run python -m build

      - name: Generate SBOM
        run: uv run cyclonedx-py environment -o sbom.json --output-format json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
            sbom.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
