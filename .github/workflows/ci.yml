name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-governance:
    name: Validate Governance Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Check required files
        run: |
          for file in CODE_OF_CONDUCT.md CONTRIBUTING.md SECURITY.md README.md LICENSE; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing required governance file: $file"
              exit 1
            fi
          done

