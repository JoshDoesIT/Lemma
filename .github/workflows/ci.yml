name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-governance:
    name: Validate Governance Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Check required files
        run: |
          for file in CODE_OF_CONDUCT.md CONTRIBUTING.md SECURITY.md README.md LICENSE; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing required governance file: $file"
              exit 1
            fi
          done

  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run Linter
        run: uv run ruff check src/ tests/ tools/

      - name: Run Formatter Check
        run: uv run ruff format --check src/ tests/ tools/

  cli-docs:
    name: CLI Documentation Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Verify every CLI command has a docs section
        run: uv run python tools/check_cli_docs.py

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run Tests with Coverage
        run: uv run pytest --cov=lemma --cov-report=term-missing -v
