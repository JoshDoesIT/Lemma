name: Security Scans

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1' # Run weekly on Mondays

jobs:
  snyk-scan:
    name: Snyk SCA & Code Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run Snyk SCA (Open Source)
        uses: snyk/actions/python-3.10@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
        continue-on-error: true

      - name: Run Snyk Code (SAST)
        uses: snyk/actions/python-3.10@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
        continue-on-error: true

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]" pip-licenses

      - name: Run license check
        run: |
          uv run pip-licenses \
            --allow-only="Apache-2.0;MIT;ISC;BSD-2-Clause;BSD-3-Clause;PSF-2.0;Python-2.0;0BSD"

  sboms:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv venv && uv pip install -e ".[dev]" cyclonedx-bom

      - name: Generate CycloneDX SBOM
        run: uv run cyclonedx-py environment -o sbom.json --output-format json
